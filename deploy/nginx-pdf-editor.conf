# PDF 编辑器 Nginx 配置
#
# 部署位置:
#   - Ubuntu/Debian: /etc/nginx/sites-available/pdf-editor (软链到 sites-enabled/)
#   - CentOS/RHEL:   /etc/nginx/conf.d/pdf-editor.conf
#
# 应用配置:
#   sudo nginx -t && sudo systemctl reload nginx

# 关键: 补全 .mjs 的 MIME 类型, 否则 pdfjs worker 加载失败
types {
    application/javascript  mjs;
}

server {
    listen 80 default_server;
    server_name _;                       # IP 直接访问, 不限域名

    root /var/www/pdf-editor;
    index index.html;

    client_max_body_size 100M;           # 用户上传 PDF 可能较大

    # gzip: JS/CSS 体积压缩 60-80%
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/wasm
        text/css
        text/plain
        image/svg+xml;

    # 哈希命名的资源: 永久强缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 字体文件: 30 天缓存 + 允许跨域(为未来 CDN 留口)
    location /fonts/ {
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # SPA fallback + index.html 禁缓存
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
