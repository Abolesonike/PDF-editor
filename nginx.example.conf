# ============================================
# Nginx 配置示例 - PDF Editor SPA (React + BrowserRouter)
# 域名: www.pdfeditorfree.cn
# ============================================

# HTTP: 80 端口强制跳转 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name www.pdfeditorfree.cn pdfeditorfree.cn;

    # ACME 证书验证（如果使用 Let's Encrypt/Certbot，保留此行）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.pdfeditorfree.cn$request_uri;
    }
}

# HTTPS: 443 端口主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.pdfeditorfree.cn;

    # SSL 证书路径（请替换为实际路径）
    ssl_certificate     /etc/letsencrypt/live/www.pdfeditorfree.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.pdfeditorfree.cn/privkey.pem;

    # SSL 安全加固
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # 网站根目录（请替换为实际 dist 目录）
    root /var/www/pdf-editor/dist;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;
    gzip_min_length 1024;

    # 安全响应头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 静态资源：长期缓存（因为 Vite 打包后有 hash）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # 字体文件跨域（pdfjs 可能通过 Worker 加载字体）
    location ~* \.(woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        access_log off;
    }

    # 明确存在的文件直接返回（sitemap.xml, robots.txt, favicon.svg 等）
    location = /sitemap.xml {
        add_header Content-Type "application/xml" always;
        expires 1d;
        add_header Cache-Control "public" always;
    }

    location = /robots.txt {
        add_header Content-Type "text/plain" always;
        expires 1d;
        add_header Cache-Control "public" always;
    }

    # SPA 核心配置：所有路由 fallback 到 index.html
    # 优先尝试精确文件匹配 -> 目录 -> 最后回退 index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # 日志（可选）
    access_log /var/log/nginx/pdf-editor.access.log;
    error_log  /var/log/nginx/pdf-editor.error.log;
}

# 裸域名跳转到 www（可选）
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pdfeditorfree.cn;

    ssl_certificate     /etc/letsencrypt/live/www.pdfeditorfree.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.pdfeditorfree.cn/privkey.pem;

    return 301 https://www.pdfeditorfree.cn$request_uri;
}
